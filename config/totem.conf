# Uncomment the following lines to enable the Corne RGB Underglow
# CONFIG_ZMK_RGB_UNDERGLOW=y
# CONFIG_WS2812_STRIP=y

# Uncomment the following line to enable the Corne OLED Display
# CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_USB_LOGGING=n

# Bootloader support for XIAO nRF52840 (Adafruit nRF52 Bootloader)
CONFIG_RETAINED_MEM=y
CONFIG_RETENTION=y
CONFIG_RETENTION_BOOT_MODE=y
CONFIG_ZMK_BOOTMODE_MAGIC_VALUE_BOOTLOADER_TYPE_ADAFRUIT_NRF52=y

# ── Onboard LED status indicators ─────────────────────────────────────────────
# Reports battery level over BLE (shows in OS battery menu for both halves)
CONFIG_ZMK_BATTERY_REPORTING=y
# Enables Zephyr's generic GPIO LED driver (required for LED status features)
CONFIG_LED=y